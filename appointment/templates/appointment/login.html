{% extends "appointment/base.html" %}
{% block title %}登录 - 云诊所管理系统{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header text-center"><h4>云诊所管理系统</h4></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">{{ field.label_tag }}{{ field }}</div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">登录</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
